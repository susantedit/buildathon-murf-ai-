# Render Blueprint for Vortex Voice AI Backend
# This file enables one-click deployment to Render

services:
  - type: web
    name: vortex-voice-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: MURF_API_KEY
        sync: false  # Set manually in Render dashboard
    healthCheckPath: /
